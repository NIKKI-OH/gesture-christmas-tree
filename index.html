<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CNY Fireworks 2024</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050000; } /* 深邃的红黑底色 */
        #canvas-container { 
            width: 100vw; height: 100vh; position: fixed; 
            background: radial-gradient(circle at center, #1a0505 0%, #000000 100%); /* 朱砂暗红渐变 */
        }
        #ui { 
            position: fixed; top: 15%; left: 50%; transform: translateX(-50%); 
            color: #ffcc99; z-index: 100; pointer-events: none; 
            font-family: "Microsoft YaHei", sans-serif; text-shadow: 0 0 10px #d4380d; 
            text-align: center; width: 100%; letter-spacing: 4px; font-weight: bold;
            opacity: 0; transition: opacity 1s; font-size: 16px;
        }
        #video-input { position: absolute; opacity: 0; width: 1px; height: 1px; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui">🧧 握拳聚福运 · 张手放烟花 🧨</div>
    <video id="video-input" playsinline></video>
    <div id="canvas-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script type="module">
        import * as THREE from 'three';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';

        let targetMorph = 0, currentMorph = 0;

        // --- 1. 场景设置 ---
        const scene = new THREE.Scene();
        // 增加一点红色雾气，让黑色背景不那么生硬
        scene.fog = new THREE.FogExp2(0x110000, 0.02);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.0, 16); 

        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        // Bloom: 强度调低，阈值调高，只让亮部发光，防止"光污染"
        const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        composer.addPass(bloom);

        // --- 2. 春节粒子系统 ---
        const count = 38000;
        const geo = new THREE.BufferGeometry();
        const pLantern = new Float32Array(count * 3); // 灯笼位置
        const pFirework = new Float32Array(count * 3); // 烟花位置
        const attr = new Float32Array(count * 3);  // x=随机, y=角度, z=类型

        for (let i = 0; i < count; i++) {
            const i3 = i * 3;
            const r = Math.random();

            // --- A. 大红灯笼形态 (椭圆 + 骨架) ---
            // 经纬度分布
            const phi = Math.acos(-1 + (2 * i) / count);
            const theta = Math.sqrt(count * Math.PI) * phi;
            
            // 灯笼的"骨架"感：每隔一段距离半径收缩一下
            let lanternR = 5.0;
            // 制造竖向的"灯笼骨"纹理
            const rib = Math.cos(theta * 12) * 0.2; 
            lanternR += rib;
            
            // 椭圆方程 (Y轴拉长)
            pLantern[i3] = lanternR * Math.sin(phi) * Math.cos(theta);
            pLantern[i3+1] = (lanternR * 1.3) * Math.cos(phi); // 拉长Y轴
            pLantern[i3+2] = lanternR * Math.sin(phi) * Math.sin(theta);

            // 稍微加一点内部的"烛光粒子"
            if (r > 0.9) {
                pLantern[i3] *= 0.5;
                pLantern[i3+1] *= 0.5;
                pLantern[i3+2] *= 0.5;
            }

            // --- B. 盛世烟花形态 (喷泉 + 螺旋) ---
            // 模拟向上喷射然后散开的效果
            const fwAngle = r * Math.PI * 2;
            const fwH = (Math.random() - 0.5) * 2.0; // 高度分散
            // 螺旋半径随高度变化
            const spiralR = Math.pow(r, 0.5) * 12.0;
            
            pFirework[i3] = Math.cos(fwAngle * 10 + r * 20) * spiralR; // 强烈的螺旋
            pFirework[i3+1] = (r * 15 - 7.5); // 垂直拉伸
            pFirework[i3+2] = Math.sin(fwAngle * 10 + r * 20) * spiralR;

            attr[i3] = r;           // 随机值
            attr[i3+1] = theta;     // 角度信息用于着色
            attr[i3+2] = (r > 0.95) ? 1.0 : 0.0; // 1.0=爆裂火星
        }

        geo.setAttribute('position', new THREE.BufferAttribute(pLantern, 3));
        geo.setAttribute('aTarget', new THREE.BufferAttribute(pFirework, 3));
        geo.setAttribute('aAttr', new THREE.BufferAttribute(attr, 3));

        const mat = new THREE.ShaderMaterial({
            uniforms: { uTime: { value: 0 }, uMorph: { value: 0 } },
            vertexShader: `
                uniform float uTime; uniform float uMorph;
                attribute vec3 aTarget; attribute vec3 aAttr;
                varying vec3 vCol; varying float vAlpha;
                
                void main() {
                    float rnd = aAttr.x;
                    float isSpark = aAttr.z;
                    
                    // 平滑插值
                    float m = smoothstep(0.0, 1.0, uMorph);
                    vec3 p = mix(position, aTarget, m);
                    
                    // 动态旋转：灯笼慢转，烟花快旋
                    float rotSpeed = 0.2 + m * 0.5; 
                    float rot = uTime * rotSpeed + p.y * 0.1;
                    float c = cos(rot); float s = sin(rot);
                    p.xz *= mat2(c, -s, s, c);

                    // --- 核心审美：颜色调校 ---
                    vec3 col;
                    
                    // 1. 灯笼颜色 (中国红 - 朱砂红 - 橘黄烛光)
                    // 越靠中心(p.y near 0)越亮黄，边缘越深红
                    float yNorm = abs(position.y) / 6.0;
                    vec3 lanternCore = vec3(1.0, 0.6, 0.1); // 烛光橘
                    vec3 lanternEdge = vec3(0.9, 0.0, 0.1); // 中国红
                    vec3 colLantern = mix(lanternCore, lanternEdge, pow(yNorm, 0.5));

                    // 2. 烟花颜色 (香槟金 - 亮白 - 少量红)
                    // 拒绝纯黄(1,1,0)，使用香槟金(1.0, 0.85, 0.4)
                    vec3 gold = vec3(1.0, 0.85, 0.4); 
                    vec3 white = vec3(1.0, 1.0, 0.9);
                    vec3 redSpark = vec3(1.0, 0.2, 0.2);
                    
                    vec3 colFirework;
                    if (isSpark > 0.5) {
                        colFirework = redSpark; // 零星的红色火药点缀
                    } else {
                        // 根部亮白，末端金黄
                        colFirework = mix(white, gold, rnd); 
                    }

                    // 混合
                    vCol = mix(colLantern, colFirework, m);

                    // 3. 大小处理
                    vec4 mvp = modelViewMatrix * vec4(p, 1.0);
                    float baseSize = 4.0;
                    if (m > 0.5) baseSize = 3.0; // 烟花粒子细腻一点
                    if (isSpark > 0.5) baseSize = 6.0; // 火星大一点
                    
                    gl_PointSize = (baseSize * (1.0 + rnd*0.5)) * (18.0 / -mvp.z);
                    gl_Position = projectionMatrix * mvp;
                    
                    // 握拳时灯笼稍微实一点，烟花稍微虚一点
                    vAlpha = 0.8 + 0.2 * m;
                }
            `,
            fragmentShader: `
                varying vec3 vCol; varying float vAlpha;
                void main() {
                    vec2 uv = gl_PointCoord - vec2(0.5);
                    float d = length(uv);
                    if (d > 0.5) discard;
                    
                    // 光晕更柔和，像宣纸灯笼的质感
                    float glow = 1.0 - d * 2.0;
                    glow = pow(glow, 2.0); 
                    
                    gl_FragColor = vec4(vCol, glow * vAlpha);
                }
            `,
            transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
        });
        scene.add(new THREE.Points(geo, mat));

        // --- 3. 背景氛围 (金色流光微尘) ---
        const bgCount = 800;
        const bgGeo = new THREE.BufferGeometry();
        const bgPos = new Float32Array(bgCount * 3);
        for(let i=0; i<bgCount*3; i++) bgPos[i] = (Math.random() - 0.5) * 60;
        bgGeo.setAttribute('position', new THREE.BufferAttribute(bgPos, 3));
        const bgMat = new THREE.PointsMaterial({
            color: 0xffaa33, // 暖金色
            size: 0.3, 
            transparent: true, opacity: 0.3,
            blending: THREE.AdditiveBlending
        });
        const bgSystem = new THREE.Points(bgGeo, bgMat);
        scene.add(bgSystem);

        // --- 4. 交互逻辑 ---
        async function init() {
            const video = document.getElementById('video-input');
            const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
            
            hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.5 });
            hands.onResults((res) => {
                if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
                    const lm = res.multiHandLandmarks[0];
                    const handSize = Math.hypot(lm[0].x - lm[9].x, lm[0].y - lm[9].y);
                    const fingerGap = Math.hypot(lm[8].x - lm[4].x, lm[8].y - lm[4].y);
                    const ratio = fingerGap / (handSize + 0.001); 
                    targetMorph = THREE.MathUtils.smoothstep(ratio, 0.2, 0.6);
                } else {
                    targetMorph = 0;
                }
            });

            const cam = new Camera(video, {
                onFrame: async () => { await hands.send({image: video}); },
                width: 480, height: 360
            });
            
            cam.start().then(() => {
                document.getElementById('ui').style.opacity = 1;
                setTimeout(() => { document.getElementById('ui').style.opacity = 0; }, 4000);
            });
        }

        function loop() {
            requestAnimationFrame(loop);
            const t = performance.now() * 0.001;
            mat.uniforms.uTime.value = t;
            
            currentMorph += (targetMorph - currentMorph) * 0.05;
            mat.uniforms.uMorph.value = currentMorph;
            
            scene.rotation.y += 0.002;
            
            // 背景微尘飘动
            const bgArr = bgSystem.geometry.attributes.position.array;
            for(let i=1; i<bgCount*3; i+=3) {
                bgArr[i] += 0.01; // 缓缓上升
                if(bgArr[i] > 30) bgArr[i] = -30;
            }
            bgSystem.geometry.attributes.position.needsUpdate = true;

            composer.render();
        }

        init();
        loop();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
